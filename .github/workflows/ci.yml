name: CI

on:
  push:
    branches: [main, harsh]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: bharatshop_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: backend
    env:
      SECRET_KEY: ci-secret
      DEBUG: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check .
        continue-on-error: true

      - name: Verify migrations apply + reverse
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/bharatshop_mig
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -c 'CREATE DATABASE bharatshop_mig;'
          alembic upgrade head
          alembic downgrade base

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/bharatshop_test
        run: pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Type-check + build
        run: npm run build

  # Deployment: Vercel's Git integration auto-deploys on push to the production
  # branch. No explicit deploy job is needed here. Run DB migrations against the
  # production Neon database from your machine / a manual step after merge:
  #   cd backend && DATABASE_URL=<neon-pooled-url> alembic upgrade head
